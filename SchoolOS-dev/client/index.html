<!doctype html>
<html lang="en" data-theme="light" data-accent="ink" data-density="comfortable">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schola — School Management</title>
    <script>
      // Restore theme/accent/density before paint
      (function() {
        try {
          var s = JSON.parse(localStorage.getItem('schoolos-settings') || '{}');
          if (s.theme) document.documentElement.dataset.theme = s.theme;
          if (s.accent) document.documentElement.dataset.accent = s.accent;
          if (s.density) document.documentElement.dataset.density = s.density;
          if (s.lang === 'ar') { document.documentElement.dir = 'rtl'; document.documentElement.lang = 'ar'; }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
